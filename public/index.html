<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooRichToFunction | Luxury Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="score-board">Luxury Points: <span id="score">0</span></div>
            <div class="rank-tag" id="rank">Broke Energy</div>
        </header>

        <main id="game-container">
            <div class="card">
                <h1 style="font-family: 'Playfair Display', serif; color: #d4af37;">TooRichToFunction</h1>
                <p>Welcome to the simulation of the 0.01%.</p>
                <button id="start-btn">Enter The High Life</button>
            </div>
        </main>
    </div>

    <script type="module">
        import Game from './js/game.js';

        // 1. Start the game when the button is clicked
        const startBtn = document.getElementById('start-btn');
        if (startBtn) {
            startBtn.onclick = () => Game.init();
        }

        // 2. GLOBAL BRIDGE: This makes choice buttons work
        window.makeChoice = (index) => {
            Game.handleChoice(index);
        };
    </script>
</body>
</html>
