<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooRichToFunction | Luxury Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="score-board">Luxury Points: <span id="score">0</span></div>
            <div class="rank-tag" id="rank">Broke Energy</div>
        </header>

        <main id="game-container">
            <div class="card">
                <h1 style="font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.5rem;">TooRichToFunction</h1>
                <p>A simulation for those who find reality too affordable.</p>
                <button id="start-btn">Enter The High Life</button>
            </div>
        </main>
    </div>

    <script type="module">
        // Import using curly braces to match the Named Export in game.js
        import { Game } from './js/game.js';

        console.log("Game Module Loaded");

        const startBtn = document.getElementById('start-btn');
        if (startBtn) {
            startBtn.onclick = () => {
                console.log("Start button clicked");
                Game.init();
            };
        }

        // Bridge to allow HTML buttons to call Game logic
        window.makeChoice = (index) => {
            console.log("Choice made:", index);
            Game.handleChoice(index);
        };
    </script>
</body>
</html>
