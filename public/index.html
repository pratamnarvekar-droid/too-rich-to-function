<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooRichToFunction | Luxury Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="score-board">Luxury Points: <span id="score">0</span></div>
            <div class="rank-tag" id="rank">Broke Energy</div>
        </header>

        <main id="game-container">
            <div class="card">
                <h1 style="font-family: 'Playfair Display', serif; color: #d4af37;">TooRichToFunction</h1>
                <p>Welcome to the simulation of the 0.01%.</p>
                <button id="start-btn">Enter The High Life</button>
            </div>
        </main>
    </div>

    <script type="module">
        // Use absolute paths to prevent Vercel errors
        import Game from '/js/game.js';

        console.log("Main Module Loaded");

        const startBtn = document.getElementById('start-btn');
        if (startBtn) {
            startBtn.onclick = () => {
                console.log("Start Button Clicked");
                Game.init();
            };
        }

        // Global bridge for choice buttons
        window.makeChoice = (index) => {
            console.log("Choice Clicked:", index);
            Game.handleChoice(index);
        };
    </script>
</body>
</html>
